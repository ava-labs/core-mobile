name: Mobile PR

on:
  pull_request:
    branches:
      - 'main'

permissions:
  contents: read
  # The following give Dependabot permission to write Eslint annotation results
  checks: write
  pull-requests: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3

      - name: Set up node
        uses: actions/setup-node@3235b876344d2a9aa001b8d1453c930bba69e610 # v3
        with:
          node-version: 20
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --immutable && yarn setup
        env: 
          APP_ENV: ci

      - name: Eslint
        run: yarn lint --quiet

      - name: Typescript
        run: yarn tsc

      - name: Test
        env:
          NODE_OPTIONS: '--max_old_space_size=4096'
        run: yarn test:coverage --silent

      - name: Upload coverage artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: mobile-pr-coverage
          if-no-files-found: warn
          path: |
            packages/core-mobile/coverage
            packages/core-mobile/coverage-thresholds.json
            packages/k2-alpine/coverage
            packages/k2-alpine/coverage-thresholds.json
